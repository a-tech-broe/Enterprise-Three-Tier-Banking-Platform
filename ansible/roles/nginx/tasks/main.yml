---
- name: Install nginx
  ansible.builtin.package:
    name: nginx
    state: present

- name: Deploy the main nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: Reload nginx

- name: Deploy the banking-platform site
  ansible.builtin.template:
    src: banking-platform.conf.j2
    dest: /etc/nginx/conf.d/banking-platform.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Remove the default welcome page config if present
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
