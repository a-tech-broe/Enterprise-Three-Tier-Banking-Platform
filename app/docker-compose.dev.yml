# Local development stack with hot reload:
#   docker compose -f docker-compose.dev.yml up --build
#   web (Vite) -> http://localhost:5173   api -> http://localhost:8081/docs
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: banking_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the production entrypoint with autoreload and mount the source.
    command: ["uvicorn", "banking.main:app", "--host", "0.0.0.0", "--port", "8081", "--reload"]
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://bankadmin:banking_dev@db:5432/banking
      CORS_ORIGINS: "*"
    volumes:
      - ./src:/app/src
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8081
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data_dev:
