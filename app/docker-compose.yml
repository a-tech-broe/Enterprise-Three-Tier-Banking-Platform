# Local full-stack banking platform: PostgreSQL + FastAPI API + React web.
#   docker compose up --build
#   web  -> http://localhost:8080     api -> http://localhost:8081/docs
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: ${DB_USER:-bankadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-banking_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bankadmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://${DB_USER:-bankadmin}:${DB_PASSWORD:-banking_dev}@db:5432/banking
      CORS_ORIGINS: "*"
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  postgres_data:
