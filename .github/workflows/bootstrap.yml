name: bootstrap

# One-click provisioning of everything the OIDC deploy role needs, so no manual
# AWS CLI is ever required:
#   1. Creates the GitHub OIDC identity provider (if missing).
#   2. Sets the role's trust policy so this repo can assume it via OIDC.
#   3. Grants the role deploy permissions. Prefers a scoped customer-managed
#      policy (docs/iam-deploy-policy.json, created by an admin) if it exists;
#      otherwise attaches AWS-managed PowerUserAccess + IAMFullAccess as a
#      fallback the bootstrap identity can attach without iam:CreatePolicy.
#   4. (optional) Creates the S3 state bucket + DynamoDB lock table if missing.
#
# Auth: uses the static admin keys stored in secrets (AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY). This is the ONLY workflow that uses them; once it has
# run, delete those secrets and everything else runs on short-lived OIDC.
#
# The bootstrap identity must be allowed: iam:CreateOpenIDConnectProvider,
# iam:GetOpenIDConnectProvider, iam:UpdateAssumeRolePolicy, iam:GetPolicy,
# iam:AttachRolePolicy (and s3:*/dynamodb:* if create_backend). For the scoped
# path, an admin additionally runs iam:CreatePolicy once, out of band.
#
# Run: Actions -> bootstrap -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      create_backend:
        description: Also create the S3 state bucket + DynamoDB lock table if they do not exist
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: provision OIDC role + permissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - verify admin keys and identifiers are present
        env:
          AK: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SK: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          TABLE: ${{ vars.TF_LOCK_TABLE || secrets.TF_LOCK_TABLE }}
        run: |
          missing=()
          [ -z "$AK" ]       && missing+=("AWS_ACCESS_KEY_ID (secret)")
          [ -z "$SK" ]       && missing+=("AWS_SECRET_ACCESS_KEY (secret)")
          [ -z "$ROLE_ARN" ] && missing+=("AWS_ROLE_ARN")
          [ -z "$BUCKET" ]   && missing+=("TF_STATE_BUCKET")
          [ -z "$TABLE" ]    && missing+=("TF_LOCK_TABLE")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required config: ${missing[*]}. See docs/RUNBOOK.md."
            exit 1
          fi

      - name: Configure AWS credentials (static admin keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

      - name: Resolve account id and role name
        id: ids
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_NAME="${ROLE_ARN##*/}"
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "role_name=$ROLE_NAME"   >> "$GITHUB_OUTPUT"
          echo "Account=$ACCOUNT_ID  Role=$ROLE_NAME  Repo=${GITHUB_REPOSITORY}"

      - name: Ensure GitHub OIDC identity provider exists
        env:
          ACCOUNT_ID: ${{ steps.ids.outputs.account_id }}
        run: |
          PROVIDER_ARN="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
          if aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$PROVIDER_ARN" >/dev/null 2>&1; then
            echo "OIDC provider already exists."
          else
            echo "Creating OIDC provider..."
            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1
          fi

      - name: Apply role trust policy (OIDC, scoped to this repo)
        env:
          ACCOUNT_ID: ${{ steps.ids.outputs.account_id }}
          ROLE_NAME: ${{ steps.ids.outputs.role_name }}
          REPO: ${{ github.repository }}
        run: |
          cat > trust.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "GitHubActionsOIDC",
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": { "token.actions.githubusercontent.com:aud": "sts.amazonaws.com" },
                  "StringLike": { "token.actions.githubusercontent.com:sub": "repo:${REPO}:*" }
                }
              }
            ]
          }
          EOF
          aws iam update-assume-role-policy --role-name "$ROLE_NAME" --policy-document file://trust.json
          echo "Trust policy applied to $ROLE_NAME."

      - name: Apply deploy permissions (scoped-if-present, else managed fallback)
        env:
          ACCOUNT_ID: ${{ steps.ids.outputs.account_id }}
          ROLE_NAME: ${{ steps.ids.outputs.role_name }}
          POLICY_NAME: banking-platform-deploy
          # Managed-policy fallback used when the scoped policy does not exist and
          # the bootstrap identity cannot create one (no iam:CreatePolicy).
          FALLBACK_POLICIES: "PowerUserAccess IAMFullAccess"
        run: |
          set -euo pipefail
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"

          # Preferred path: a scoped, customer-managed policy (see
          # docs/iam-deploy-policy.json) that an admin has already created out of
          # band -- because creating it needs iam:CreatePolicy, which the deploy
          # bootstrap identity typically lacks. If present, attach just that one
          # (scoped, single policies-per-role slot).
          if aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
            echo "Scoped policy ${POLICY_NAME} found - attaching it."
            aws iam attach-role-policy --role-name "$ROLE_NAME" --policy-arn "$POLICY_ARN"
            echo "Attached ${POLICY_NAME} to ${ROLE_NAME}."
          else
            echo "Scoped policy not found (creating one needs iam:CreatePolicy)."
            echo "Falling back to AWS-managed policies (attach-only): ${FALLBACK_POLICIES}"
            for p in $FALLBACK_POLICIES; do
              aws iam attach-role-policy --role-name "$ROLE_NAME" \
                --policy-arn "arn:aws:iam::aws:policy/$p"
              echo "attached $p"
            done
            echo "::notice::Using broad AWS-managed policies. For least privilege, have an"
            echo "::notice::admin create the scoped policy from docs/iam-deploy-policy.json"
            echo "::notice::(named ${POLICY_NAME}); re-running bootstrap will then prefer it."
          fi

      - name: (optional) Ensure Terraform backend exists
        if: ${{ inputs.create_backend }}
        env:
          REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
          STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
          LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || secrets.TF_LOCK_TABLE }}
        run: |
          # State bucket (idempotent).
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "State bucket $STATE_BUCKET already exists."
          else
            echo "Creating state bucket $STATE_BUCKET..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$STATE_BUCKET"
            else
              aws s3api create-bucket --bucket "$STATE_BUCKET" \
                --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$STATE_BUCKET" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

          # Lock table (idempotent). Must use LockID (S) as the hash key.
          if aws dynamodb describe-table --table-name "$LOCK_TABLE" >/dev/null 2>&1; then
            echo "Lock table $LOCK_TABLE already exists."
          else
            echo "Creating lock table $LOCK_TABLE..."
            aws dynamodb create-table --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE"
          fi

      - name: Summary
        run: |
          echo "### Bootstrap complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- OIDC provider ensured" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trust policy applied to \`${{ steps.ids.outputs.role_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy permissions attached" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "You can now delete the AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets and run **plan** / **deploy**." >> "$GITHUB_STEP_SUMMARY"
