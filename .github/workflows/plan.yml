name: infra-plan

# Produces a Terraform plan for a given environment and (on PRs) comments the
# summary. Reusable via workflow_call so deploy.yml can plan before applying.
on:
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to plan
        type: choice
        options: [dev, qa, uat, prod]
        default: dev
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    outputs:
      plan_exitcode:
        description: "0 = no changes, 2 = changes present"
        value: ${{ jobs.plan.outputs.exitcode }}

permissions:
  contents: read
  id-token: write        # required for AWS OIDC
  pull-requests: write   # required to comment on PRs

env:
  TF_VERSION: "1.9.8"
  # Region defaults to us-east-1 (all environments target it); override by
  # setting an AWS_REGION repository variable.
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  plan:
    name: plan (${{ inputs.environment || 'matrix' }})
    runs-on: ubuntu-latest
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    strategy:
      fail-fast: false
      # On PR we plan every env; when called/dispatched we plan just one.
      matrix:
        environment: ${{ inputs.environment && fromJSON(format('["{0}"]', inputs.environment)) || fromJSON('["dev","qa","uat","prod"]') }}
    # Note: no GitHub Environment binding here on purpose — plan must not pause
    # for approval on PRs. Approval gates live in deploy.yml / destroy.yml.
    steps:
      - uses: actions/checkout@v4

      - name: Preflight - verify required repository configuration
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ]    && missing+=("AWS_ROLE_ARN")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing repository variable(s): ${missing[*]}."
            echo "Set them under Settings → Secrets and variables → Actions → Variables."
            echo "See docs/RUNBOOK.md ('One-time: wire GitHub') for the full list."
            exit 1
          fi
          echo "Config OK. Region=${AWS_REGION}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-plan-${{ matrix.environment }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE || secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan.bin | tee plan.txt
          code=${PIPESTATUS[0]}
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          # 0 = no changes, 2 = changes, 1 = error
          if [ "$code" = "1" ]; then exit 1; fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            terraform/environments/${{ matrix.environment }}/tfplan.bin
            terraform/environments/${{ matrix.environment }}/plan.txt
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true # never fail a good plan just because commenting failed
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const env = '${{ matrix.environment }}';
              let plan = fs.readFileSync('terraform/environments/' + env + '/plan.txt', 'utf8');
              if (plan.length > 60000) plan = plan.substring(0, 60000) + "\n... (truncated)";
              const body = `### Terraform plan — \`${env}\`\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } catch (e) {
              core.warning(`Could not post plan comment: ${e.message}`);
            }
