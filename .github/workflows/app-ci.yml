name: app-ci

# APPLICATION continuous integration (the code in app/).
# Lints, tests, builds the image, and scans it. No AWS access, no deploy.
# The infra pipelines (validate/plan/deploy) are entirely separate.
on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches: [main, dev]
    paths:
      - "app/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Pytest
        run: pytest

  web:
    name: web build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      # npm install (not ci) to sidestep the npm optional-deps bug
      # (npm/cli#4828) that skips the platform rollup/esbuild native binary.
      - run: npm install --no-audit --no-fund
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build

  image:
    name: build & scan api image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t banking-platform-api:${{ github.sha }} app
      - name: Trivy vulnerability scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: banking-platform-api:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
