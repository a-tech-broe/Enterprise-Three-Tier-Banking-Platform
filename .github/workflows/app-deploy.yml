name: app-deploy

# APPLICATION delivery: build -> test -> scan -> push to ECR -> publish the image
# URI to SSM -> roll the container on the running instances (they re-pull and
# restart). This deploys ONLY the app; it never touches Terraform/infrastructure.
# Infra changes go through the separate `deploy` (infra) workflow.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, qa, uat, prod]
        default: dev
  push:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}
  PROJECT: banking-platform

concurrency:
  group: app-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  test:
    name: lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check src tests
      - run: pytest

  build-push:
    name: build, scan & push
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      target: ${{ steps.meta.outputs.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-app-build
      - name: Resolve image coordinates
        id: meta
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO="${PROJECT}-${TARGET_ENV}-api"
          TAG="sha-$(git rev-parse --short HEAD)"
          IMAGE="${REGISTRY}/${REPO}:${TAG}"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO"         >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"       >> "$GITHUB_OUTPUT"
          echo "target=$TARGET_ENV" >> "$GITHUB_OUTPUT"
      - name: Skip if image already exists (immutable tags)
        id: exists
        run: |
          if aws ecr describe-images --repository-name "${{ steps.meta.outputs.repo }}" \
               --image-ids imageTag="${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${{ steps.meta.outputs.image }} already exists; reusing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image
        if: steps.exists.outputs.exists == 'false'
        run: docker build -t "${{ steps.meta.outputs.image }}" app
      - name: Trivy scan (fail on HIGH/CRITICAL)
        if: steps.exists.outputs.exists == 'false'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - name: Push to ECR
        if: steps.exists.outputs.exists == 'false'
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.meta.outputs.registry }}"
          docker push "${{ steps.meta.outputs.image }}"

  deploy:
    name: deploy to instances
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ needs.build-push.outputs.target }}   # approval gate for uat/prod
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-app-deploy
      - name: Publish image URI to SSM
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          aws ssm put-parameter \
            --name "/${PROJECT}/${TARGET_ENV}/app_image" \
            --type String --overwrite --value "$IMAGE"
          echo "Published $IMAGE"
      - name: Roll the container on app instances (SSM)
        id: run
        run: |
          CID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --comment "Deploy banking-api ${{ needs.build-push.outputs.image }}" \
            --targets "Key=tag:Environment,Values=${TARGET_ENV}" "Key=tag:Role,Values=app" \
            --parameters commands='["sudo systemctl restart banking-app","for i in $(seq 1 24); do curl -fsS http://localhost:8081/health >/dev/null 2>&1 && { echo APP_HEALTHY; exit 0; }; sleep 5; done; echo APP_NOT_HEALTHY; exit 1"]' \
            --query Command.CommandId --output text)
          echo "command_id=$CID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command $CID"
      - name: Wait for rollout & verify health
        run: |
          CID="${{ steps.run.outputs.command_id }}"
          for i in $(seq 1 40); do
            statuses=$(aws ssm list-command-invocations --command-id "$CID" --details \
              --query 'CommandInvocations[].Status' --output text)
            echo "attempt $i: [$statuses]"
            case "$statuses" in
              *InProgress*|*Pending*|*Delayed*) sleep 10; continue;;
              "") sleep 10; continue;;
            esac
            if echo "$statuses" | grep -qvE 'Success'; then
              echo "::error::One or more instances failed to roll the app."
              aws ssm list-command-invocations --command-id "$CID" --details \
                --query 'CommandInvocations[].CommandPlugins[].Output' --output text
              exit 1
            fi
            echo "All instances healthy on the new image."
            exit 0
          done
          echo "::error::Timed out waiting for the SSM rollout."
          exit 1
