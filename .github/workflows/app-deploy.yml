name: app-deploy

# APPLICATION delivery: build -> test -> scan -> push to Docker Hub -> publish the
# image ref to SSM -> roll the container on the running instances (they re-pull and
# restart). This deploys ONLY the app; it never touches Terraform/infrastructure.
# Infra changes go through the separate `infra-deploy` workflow.
#
# Requires repo config: DOCKERHUB_USERNAME (var or secret), DOCKERHUB_TOKEN
# (secret). Use a PUBLIC Docker Hub repo so instances can pull without creds.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, qa, uat, prod]
        default: dev
  push:
    branches: [dev]
    paths:
      - "app/**"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # A push to `dev` ships to dev automatically. Prod (and qa/uat) ship ONLY via an
  # explicit workflow_dispatch — merging to main never auto-ships to prod.
  TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}
  PROJECT: banking-platform

concurrency:
  group: app-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  test:
    name: lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check src tests
      - run: pytest

  build-push:
    name: build, scan & push (Docker Hub)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight - Docker Hub credentials
        env:
          DH_USER: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ] && exit 0
          echo "::error::Set DOCKERHUB_USERNAME (var or secret) and DOCKERHUB_TOKEN (secret)."
          exit 1
      - name: Resolve image coordinates
        id: meta
        env:
          DH_USER: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DH_REPO: ${{ vars.DOCKERHUB_REPO || 'banking-platform-api' }}
        run: |
          TAG="${TARGET_ENV}-sha-$(git rev-parse --short HEAD)"
          IMAGE="${DH_USER}/${DH_REPO}:${TAG}"
          echo "image=$IMAGE"       >> "$GITHUB_OUTPUT"
          echo "target=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "Image: $IMAGE"
      - name: Log in to Docker Hub
        env:
          DH_USER: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DH_TOKEN" | docker login --username "$DH_USER" --password-stdin
      - name: Build image
        run: docker build -t "${{ steps.meta.outputs.image }}" app
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Trivy scan (fail on HIGH/CRITICAL)
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed \
            --scanners vuln --format table "${{ steps.meta.outputs.image }}"
      - name: Push to Docker Hub
        run: docker push "${{ steps.meta.outputs.image }}"

  deploy:
    name: deploy to instances
    needs: build-push
    runs-on: ubuntu-latest
    # Binds to the target Environment (its reviewers, if any, gate the deploy).
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-app-deploy
      # IMAGE is computed and used within this single step. It must NOT flow
      # through a step output / env expression: if DOCKERHUB_USERNAME is a secret,
      # GitHub scrubs any output/expression containing it to an empty string.
      # Built inline from the DH_USER env, its real value reaches the AWS CLI
      # (only masked in logs). command_id (not secret) is fine to output.
      - name: Publish image & roll the container (SSM)
        id: run
        env:
          DH_USER: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DH_REPO: ${{ vars.DOCKERHUB_REPO || 'banking-platform-api' }}
        run: |
          if [ -z "$DH_USER" ]; then echo "::error::Set DOCKERHUB_USERNAME (var or secret)."; exit 1; fi
          IMAGE="${DH_USER}/${DH_REPO}:${TARGET_ENV}-sha-$(git rev-parse --short HEAD)"
          echo "Deploying image: $IMAGE"

          aws ssm put-parameter \
            --name "/${PROJECT}/${TARGET_ENV}/app_image" \
            --type String --overwrite --value "$IMAGE"

          CID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --comment "Deploy banking-api" \
            --targets "Key=tag:Environment,Values=${TARGET_ENV}" "Key=tag:Role,Values=app" \
            --parameters commands='["sudo systemctl restart banking-app || true","for i in $(seq 1 24); do curl -fsS http://localhost:8081/health >/dev/null 2>&1 && { echo APP_HEALTHY; exit 0; }; sleep 5; done","echo APP_NOT_HEALTHY","echo ===IMAGE===; aws ssm get-parameter --name /banking-platform/'"${TARGET_ENV}"'/app_image --region '"${AWS_REGION:-us-east-1}"' --query Parameter.Value --output text 2>&1","echo ===SYSTEMD===; systemctl status banking-app --no-pager -l 2>&1 | tail -20","echo ===JOURNAL===; journalctl -u banking-app --no-pager -n 40 2>&1 | tail -40","echo ===DOCKER-PS===; docker ps -a 2>&1","echo ===DOCKER-LOGS===; docker logs --tail 60 banking-app 2>&1 || echo NO-CONTAINER","exit 1"]' \
            --query Command.CommandId --output text)
          echo "command_id=$CID" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command $CID"
      - name: Wait for rollout & verify health
        run: |
          CID="${{ steps.run.outputs.command_id }}"
          for i in $(seq 1 40); do
            statuses=$(aws ssm list-command-invocations --command-id "$CID" --details \
              --query 'CommandInvocations[].Status' --output text)
            echo "attempt $i: [$statuses]"
            case "$statuses" in
              *InProgress*|*Pending*|*Delayed*) sleep 10; continue;;
              "") sleep 10; continue;;
            esac
            if echo "$statuses" | grep -qvE 'Success'; then
              echo "::error::One or more instances failed to roll the app."
              out="$(aws ssm list-command-invocations --command-id "$CID" --details \
                --query 'CommandInvocations[].CommandPlugins[].Output' --output text)"
              echo "$out"
              if echo "$out" | grep -qE 'banking-app.service not found|docker: command not found'; then
                echo "::error::Instances lack the app runtime (docker + banking-app.service). Run the 'infra-deploy' workflow once so the ASG rolls instances onto the current user-data, then re-run app-deploy."
              fi
              exit 1
            fi
            echo "All instances healthy on the new image."
            exit 0
          done
          echo "::error::Timed out waiting for the SSM rollout."
          exit 1
