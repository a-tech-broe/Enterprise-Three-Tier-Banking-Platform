name: infra-destroy

# Guarded teardown. Dispatch-only (never on push). Requires typing the environment
# name to confirm, and the destroy job binds to the GitHub Environment so its
# required reviewers hold it for approval. A prepare step first clears the things
# that would otherwise make `terraform destroy` fail halfway: RDS deletion
# protection, a stale final snapshot, and non-empty (versioned) S3 buckets.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to DESTROY
        type: choice
        options: [dev, qa, uat, prod]
        default: dev
      confirm:
        description: Type the environment name exactly to confirm
        type: string
        required: true

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT: banking-platform

concurrency:
  group: destroy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  guard:
    name: confirm
    runs-on: ubuntu-latest
    steps:
      - name: Verify required repository configuration
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ]    && missing+=("AWS_ROLE_ARN")
          [ -z "$TF_STATE_BUCKET" ] && missing+=("TF_STATE_BUCKET")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing repository variable(s): ${missing[*]}. See docs/RUNBOOK.md."
            exit 1
          fi
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "::error::Confirmation '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'."
            exit 1
          fi
      - name: Warn on production teardown
        if: github.event.inputs.environment == 'prod'
        run: echo "::warning::Destroying PROD — proceeds only after Environment approval."

  destroy:
    name: destroy
    needs: guard
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}   # <-- approval gate
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-destroy

      - name: Prepare teardown (clear destroy blockers)
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          PREFIX="${PROJECT}-${ENVIRONMENT}"
          DB_ID="${PREFIX}-postgres"

          echo "::group::Disable RDS deletion protection"
          if aws rds describe-db-instances --db-instance-identifier "$DB_ID" >/dev/null 2>&1; then
            aws rds modify-db-instance --db-instance-identifier "$DB_ID" \
              --no-deletion-protection --apply-immediately >/dev/null
            echo "deletion protection disabled on $DB_ID"
          else
            echo "no RDS instance $DB_ID (nothing to do)"
          fi
          echo "::endgroup::"

          echo "::group::Remove any stale final snapshot"
          SNAP="${PREFIX}-postgres-final"
          if aws rds describe-db-snapshots --db-snapshot-identifier "$SNAP" >/dev/null 2>&1; then
            aws rds delete-db-snapshot --db-snapshot-identifier "$SNAP" >/dev/null || true
            echo "deleted stale snapshot $SNAP (a fresh one is taken on destroy for non-dev)"
          fi
          echo "::endgroup::"

          echo "::group::Empty S3 buckets (incl. all versions)"
          # Delete in batches via a file (not a CLI arg) — a full bucket of access
          # logs overflows the argv length limit ("Argument list too long").
          empty_bucket() {
            local b="$1"
            aws s3api head-bucket --bucket "$b" 2>/dev/null || { echo "  (no bucket $b)"; return 0; }
            local sel n payload="${RUNNER_TEMP:-/tmp}/del.json"
            for sel in Versions DeleteMarkers; do
              while :; do
                aws s3api list-object-versions --bucket "$b" --max-items 1000 \
                  --query "{Objects: ${sel}[].{Key:Key,VersionId:VersionId}}" --output json > "$payload"
                n=$(jq '.Objects | length' "$payload")
                [ "$n" -eq 0 ] && break
                aws s3api delete-objects --bucket "$b" --delete "file://${payload}" >/dev/null
                echo "  removed $n ${sel} from $b"
              done
            done
          }
          empty_bucket "${PREFIX}-alb-logs-${ACCOUNT_ID}"
          empty_bucket "${PREFIX}-ansible-ssm-${ACCOUNT_ID}"
          echo "::endgroup::"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Init
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET || secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE || secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"
      - name: Destroy
        working-directory: terraform/environments/${{ env.ENVIRONMENT }}
        run: terraform destroy -input=false -auto-approve
